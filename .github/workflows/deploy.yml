name: Deploy JOJOFISH

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jojofish-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /var/www/jojofish.wakaka007.cn/current
      SSH_HOST: ${{ secrets.SG_HOST }}
      SSH_USER: ${{ secrets.SG_USER }}
      SSH_PORT: ${{ secrets.SG_PORT || '22' }}
      VITE_LEADERBOARD_API_URL: /api
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.PGSSL || 'false' }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN || 'true' }}
      PORT: ${{ secrets.PORT || '8787' }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_VERIFICATION_TOKEN: ${{ secrets.FEISHU_VERIFICATION_TOKEN }}
      FEISHU_ENCRYPT_KEY: ${{ secrets.FEISHU_ENCRYPT_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
      BOT_PORT: ${{ secrets.BOT_PORT || '8790' }}
   
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: deploy_config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SG_SSH_KEY }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Deployment secrets are incomplete. Set SG_HOST, SG_USER, SG_PORT, and SG_SSH_KEY to enable automatic deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm run build

      - name: Configure SSH
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SG_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/jojofish_deploy_key
          chmod 600 ~/.ssh/jojofish_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload build artifacts
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/dist/"
          rsync -az \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            server bot package.json package-lock.json .env.example "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Install API dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && npm ci --omit=dev"

      - name: Configure PostgreSQL API
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          DB_URL_Q=$(printf '%q' "$DATABASE_URL")
          PGSSL_Q=$(printf '%q' "$PGSSL")
          CORS_Q=$(printf '%q' "$CORS_ORIGIN")
          PORT_Q=$(printf '%q' "$PORT")
          FEISHU_APP_ID_Q=$(printf '%q' "$FEISHU_APP_ID")
          FEISHU_APP_SECRET_Q=$(printf '%q' "$FEISHU_APP_SECRET")
          FEISHU_VERIFICATION_TOKEN_Q=$(printf '%q' "$FEISHU_VERIFICATION_TOKEN")
          FEISHU_ENCRYPT_KEY_Q=$(printf '%q' "$FEISHU_ENCRYPT_KEY")
          OPENAI_API_KEY_Q=$(printf '%q' "$OPENAI_API_KEY")
          OPENAI_MODEL_Q=$(printf '%q' "$OPENAI_MODEL")

          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && printf 'DATABASE_URL=%s\nPGSSL=%s\nCORS_ORIGIN=%s\nPORT=%s\nFEISHU_APP_ID=%s\nFEISHU_APP_SECRET=%s\nFEISHU_VERIFICATION_TOKEN=%s\nFEISHU_ENCRYPT_KEY=%s\nOPENAI_API_KEY=%s\nOPENAI_MODEL=%s\n' $DB_URL_Q $PGSSL_Q $CORS_Q $PORT_Q $FEISHU_APP_ID_Q $FEISHU_APP_SECRET_Q $FEISHU_VERIFICATION_TOKEN_Q $FEISHU_ENCRYPT_KEY_Q $OPENAI_API_KEY_Q $OPENAI_MODEL_Q > .env && chmod 600 .env"

          if [ -z "$DATABASE_URL" ]; then
            echo "::notice::DATABASE_URL secret is not set. Configure it so the API can store leaderboards and broadcasts in PostgreSQL."
            exit 0
          fi

          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && DATABASE_URL=$DB_URL_Q psql \"\$DATABASE_URL\" -f server/schema.sql"

      - name: Verify uploaded files
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "test -f '$DEPLOY_PATH/index.html' && test -f '$DEPLOY_PATH/server/index.mjs' && test -f '$DEPLOY_PATH/bot/feishu-openai-bot.mjs' && find '$DEPLOY_PATH' -type d -exec chmod 755 {} + && find '$DEPLOY_PATH' -type f -exec chmod 644 {} + && [ ! -f '$DEPLOY_PATH/.env' ] || chmod 600 '$DEPLOY_PATH/.env'"

      - name: Configure Feishu bot
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Feishu bot secrets are incomplete. Set FEISHU_APP_ID, FEISHU_APP_SECRET, and OPENAI_API_KEY to start the standalone bot."
            exit 0
          fi

          FEISHU_APP_ID_Q=$(printf '%q' "$FEISHU_APP_ID")
          FEISHU_APP_SECRET_Q=$(printf '%q' "$FEISHU_APP_SECRET")
          FEISHU_VERIFICATION_TOKEN_Q=$(printf '%q' "$FEISHU_VERIFICATION_TOKEN")
          FEISHU_ENCRYPT_KEY_Q=$(printf '%q' "$FEISHU_ENCRYPT_KEY")
          OPENAI_API_KEY_Q=$(printf '%q' "$OPENAI_API_KEY")
          OPENAI_MODEL_Q=$(printf '%q' "$OPENAI_MODEL")
          BOT_PORT_Q=$(printf '%q' "$BOT_PORT")

          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && printf 'FEISHU_APP_ID=%s\nFEISHU_APP_SECRET=%s\nFEISHU_VERIFICATION_TOKEN=%s\nFEISHU_ENCRYPT_KEY=%s\nOPENAI_API_KEY=%s\nOPENAI_MODEL=%s\nBOT_PORT=%s\n' $FEISHU_APP_ID_Q $FEISHU_APP_SECRET_Q $FEISHU_VERIFICATION_TOKEN_Q $FEISHU_ENCRYPT_KEY_Q $OPENAI_API_KEY_Q $OPENAI_MODEL_Q $BOT_PORT_Q > .env.bot && chmod 600 .env.bot"

          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' BOT_PORT='$BOT_PORT' bash -s" <<'EOF'
          set -e
          cd "$DEPLOY_PATH"

          pids="$(pgrep -f "$DEPLOY_PATH/bot/feishu-openai-bot.mjs" || true)"
          if [ -n "$pids" ]; then
            kill $pids || true
            sleep 1
          fi

          nohup node "$DEPLOY_PATH/bot/feishu-openai-bot.mjs" >> "$DEPLOY_PATH/bot/feishu-bot.log" 2>&1 &
          sleep 2
          curl -fsS "http://127.0.0.1:${BOT_PORT:-8790}/health"
          EOF

      - name: Patch live Feishu callback
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "PORT='$PORT' bash -s" <<'EOF'
          set -e
          port="${PORT:-8787}"
          node --input-type=module <<'NODE'
          import { spawn, spawnSync } from 'node:child_process';
          import fs from 'node:fs';

          const apiDir = '/opt/jojofish-api';
          const apiFile = `${apiDir}/index.mjs`;
          let text = fs.readFileSync(apiFile, 'utf8');

          if (!text.includes("import crypto from 'node:crypto';")) {
            text = text.replace("import cors from 'cors';", "import crypto from 'node:crypto';\nimport cors from 'cors';");
          }

          if (!text.includes("app.post('/api/feishu/events'")) {
            const route = `
          const decryptFeishuPayload = (encrypt) => {
            if (!process.env.FEISHU_ENCRYPT_KEY) {
              throw new Error('FEISHU_ENCRYPT_KEY is required for encrypted callbacks');
            }

            const key = crypto.createHash('sha256').update(process.env.FEISHU_ENCRYPT_KEY).digest();
            const encrypted = Buffer.from(encrypt, 'base64');
            const iv = encrypted.subarray(0, 16);
            const ciphertext = encrypted.subarray(16);
            const decipher = crypto.createDecipheriv('aes-256-cbc', key, iv);
            const decrypted = Buffer.concat([decipher.update(ciphertext), decipher.final()]);
            return JSON.parse(decrypted.toString('utf8'));
          };

          const getFeishuEventBody = (body) => {
            if (body?.encrypt) return decryptFeishuPayload(body.encrypt);
            return body ?? {};
          };

          const verifyFeishuCallback = (body) => {
            const token = process.env.FEISHU_VERIFICATION_TOKEN;
            if (!token) return true;
            return body?.token === token || body?.header?.token === token;
          };

          app.post('/api/feishu/events', (request, response, next) => {
            try {
              const body = getFeishuEventBody(request.body);

              if (!verifyFeishuCallback(body)) {
                response.status(401).json({ error: 'invalid_verification_token' });
                return;
              }

              if (body.type === 'url_verification') {
                response.json({ challenge: body.challenge });
                return;
              }

              response.json({ ok: true });
            } catch (error) {
              next(error);
            }
          });

          `;

            const marker = "app.use((error, _request, response, _next) => {";
            if (!text.includes(marker)) {
              throw new Error('Could not find Express error handler insertion point');
            }

            fs.copyFileSync(apiFile, `${apiFile}.bak-${Date.now()}`);
            text = text.replace(marker, `${route}${marker}`);
            fs.writeFileSync(apiFile, text);
          }

          let env = { ...process.env };
          let pids = [];
          try {
            pids = spawnSyncText('pgrep', ['-f', apiFile])
              .split(/\s+/)
              .filter(Boolean)
              .filter((pid) => pid !== String(process.pid));
          } catch {
            pids = [];
          }

          const livePid = pids[0];
          if (livePid) {
            try {
              const rawEnv = fs.readFileSync(`/proc/${livePid}/environ`, 'utf8');
              for (const entry of rawEnv.split('\0')) {
                const separator = entry.indexOf('=');
                if (separator > 0) env[entry.slice(0, separator)] = entry.slice(separator + 1);
              }
            } catch {
              // Keep the SSH environment when procfs is not readable.
            }

            for (const pid of pids) {
              try {
                process.kill(Number(pid), 'SIGTERM');
              } catch {
                // Process may have already exited.
              }
            }
          }

          await new Promise((resolve) => setTimeout(resolve, 1000));

          const log = fs.openSync(`${apiDir}/server.log`, 'a');
          const child = spawn('/usr/local/bin/node', [apiFile], {
            cwd: apiDir,
            detached: true,
            env,
            stdio: ['ignore', log, log],
          });
          child.unref();

          function spawnSyncText(command, args) {
            const result = spawnSync(command, args, { encoding: 'utf8' });
            if (result.status !== 0) return '';
            return result.stdout.trim();
          }
          NODE
          sleep 2
          curl -fsS "http://127.0.0.1:$port/api/health"
          curl -fsS -X POST "http://127.0.0.1:$port/api/feishu/events" -H "Content-Type: application/json" -d '{"type":"url_verification","challenge":"deploy_check"}'
          EOF
