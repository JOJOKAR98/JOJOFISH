name: Deploy JOJOFISH

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jojofish-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /var/www/jojofish.wakaka007.cn/current
      SSH_HOST: ${{ secrets.SG_HOST }}
      SSH_USER: ${{ secrets.SG_USER }}
      SSH_PORT: ${{ secrets.SG_PORT || '22' }}
      VITE_LEADERBOARD_API_URL: /api
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.PGSSL || 'false' }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN || 'true' }}
      PORT: ${{ secrets.PORT || '8787' }}
      APP_PROCESS_NAME: ${{ secrets.APP_PROCESS_NAME || 'jojofish' }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || 'https://jojofish.wakaka007.cn' }}
   
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: deploy_config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SG_SSH_KEY }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Deployment secrets are incomplete. Set SG_HOST, SG_USER, SG_PORT, and SG_SSH_KEY to enable automatic deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.deploy_config.outputs.ready == 'true'
        run: npm run build

      - name: Configure SSH
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SG_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/jojofish_deploy_key
          chmod 600 ~/.ssh/jojofish_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload build artifacts
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/dist/"
          rsync -az \
            -e "ssh -i ~/.ssh/jojofish_deploy_key -p $SSH_PORT" \
            server package.json package-lock.json .env.example "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Install API dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && npm ci --omit=dev"

      - name: Configure PostgreSQL API
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          if [ -n "$DATABASE_URL" ]; then
            DB_URL_Q=$(printf '%q' "$DATABASE_URL")
            PGSSL_Q=$(printf '%q' "$PGSSL")
            CORS_Q=$(printf '%q' "$CORS_ORIGIN")
            PORT_Q=$(printf '%q' "$PORT")
            ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST"               "cd '$DEPLOY_PATH' && printf 'DATABASE_URL=%s
PGSSL=%s
CORS_ORIGIN=%s
PORT=%s
' $DB_URL_Q $PGSSL_Q $CORS_Q $PORT_Q > .env && chmod 600 .env"
          else
            ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST"               "cd '$DEPLOY_PATH' && test -f .env || (echo 'DATABASE_URL secret is not set and no existing .env was found.'; exit 1)"
          fi

          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST"             "cd '$DEPLOY_PATH' && set -a && . ./.env && set +a && psql "\$DATABASE_URL" -f server/schema.sql"

      - name: Verify uploaded files
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "test -f '$DEPLOY_PATH/index.html' && test -f '$DEPLOY_PATH/server/index.mjs' && find '$DEPLOY_PATH' -type d -exec chmod 755 {} + && find '$DEPLOY_PATH' -type f -exec chmod 644 {} +"

      - name: Restart API process
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          PROCESS_Q=$(printf '%q' "$APP_PROCESS_NAME")
          ssh -i ~/.ssh/jojofish_deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST"             "set -e; cd '$DEPLOY_PATH'; set -a; [ -f .env ] && . ./.env; set +a; PORT_VALUE=${PORT:-8787}; if command -v pm2 >/dev/null 2>&1; then if pm2 describe $PROCESS_Q >/dev/null 2>&1; then pm2 reload $PROCESS_Q --update-env; else pm2 start server/index.mjs --name $PROCESS_Q --update-env; fi; pm2 save || true; elif command -v systemctl >/dev/null 2>&1 && systemctl --user is-active --quiet $PROCESS_Q; then systemctl --user restart $PROCESS_Q; elif command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet $PROCESS_Q; then sudo -n systemctl restart $PROCESS_Q; else if command -v fuser >/dev/null 2>&1; then fuser -k ${PORT_VALUE}/tcp || true; elif command -v lsof >/dev/null 2>&1; then kill $(lsof -ti tcp:${PORT_VALUE}) 2>/dev/null || true; fi; nohup node server/index.mjs > jojofish-api.log 2>&1 & sleep 3; curl -fsS http://127.0.0.1:${PORT_VALUE}/api/broadcasts >/dev/null; fi"

      - name: Verify deployed API
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          curl -fsS "$HEALTHCHECK_URL/api/health"
          curl -fsS "$HEALTHCHECK_URL/api/broadcasts"
